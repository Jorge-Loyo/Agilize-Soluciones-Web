<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8962e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Glow -->
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="url(#glow)"/>
  <!-- Brand name -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="72" fill="url(#gold)">Agilize</text>
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="300" font-size="72" fill="#f8f9fa" dx="185">Soluciones</text>
  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="400" font-size="32" fill="#a1a1aa">Tecnología que impulsa tu negocio</text>
  <!-- Services -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="500" font-size="22" fill="#d4af37" opacity="0.7">E-commerce Inteligente · Sistemas ERP · Automatización</text>
  <!-- Bottom line -->
  <rect x="480" y="500" width="240" height="2" rx="1" fill="#d4af37" opacity="0.3"/>
  <text x="600" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="400" font-size="18" fill="#a1a1aa" opacity="0.6">agilizesoluciones.com</text>
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="2" fill="#d4af37" opacity="0.3"/>
  <circle cx="150" cy="80" r="1.5" fill="#d4af37" opacity="0.2"/>
  <circle cx="1100" cy="530" r="2" fill="#d4af37" opacity="0.3"/>
  <circle cx="1050" cy="550" r="1.5" fill="#d4af37" opacity="0.2"/>
</svg>
